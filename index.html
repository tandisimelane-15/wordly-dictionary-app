<!DOCTYPE html>
<html lang ="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--Header-->
    <header>
        <h1>Wordly</h1>
        <p>Your everyday dictionary</p>
    </header>
    <!--Main-->
    <main>
        <p>Type the word below:</p>
            <form id="search-form">
                <input type="text" id="word" placeholder="Type word.....">
                <button type="submit">Search</button>
            </form>
        
        <!--error message container-->
        <div id="error-message"></div>

        <!--results container-->
        <div id="results">
            <h2 id="word-title"></h2>
            <p id="pronunciation"></p>
            <audio id="pronunciation-audio" controls></audio>
            <h3 id="part-of-speech"></h3>
            <p id="definition"></p>
            <p id="example"></p>
            <h3>Synonyms</h3>
            <p id="synonyms"></p>
        </div>
            
    </main>


    <script src="script.js"></script>
</body>
</html>
